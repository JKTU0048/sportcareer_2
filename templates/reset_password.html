<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый пароль - SportCareer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo-link">
                <div class="logo-text">🏆 SportCareer</div>
            </a>
            <ul>
                <li><a href="/">Главная</a></li>
                <li><a href="/about">О нас</a></li>
                <li><a href="/contact">Контакты</a></li>
                <li><a href="/login" style="color: #2ecc71;">Войти</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        <div class="content-block">
            <div class="login-container">
                <div class="login-form-container">
                    <h1 class="login-title">🔐 Создание нового пароля</h1>
                    
                    <form method="POST" action="/reset_password">
                        <div class="form-group">
                            <label class="form-label">Новый пароль *</label>
                            <input type="password" class="form-input" name="password" 
                                   placeholder="Введите новый пароль" required>
                            <div class="password-hint">Не менее 6 символов</div>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Подтвердите пароль *</label>
                            <input type="password" class="form-input" name="confirm_password" 
                                   placeholder="Повторите новый пароль" required>
                        </div>
                        
                        <input type="hidden" name="token" value="{{ token }}">
                        
                        <button type="submit" class="submit-btn" style="width: 100%; margin-top: 1.5rem; padding: 15px;">
                            🔄 Изменить пароль
                        </button>
                        
                        <div class="login-links" style="text-align: center; margin-top: 2rem;">
                            <a href="/login" class="back-btn">← Назад ко входу</a>
                            <a href="/" class="back-btn" style="margin-left: 1rem; background-color: #95a5a6;">На главную</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        {% endblock %}
    </main>

    <footer>
        <p>🏆 SportCareer</p>
    </footer>
    
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = this.querySelector('input[name="password"]').value;
            const confirmPassword = this.querySelector('input[name="confirm_password"]').value;
            const btn = this.querySelector('.submit-btn');
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('❌ Пароли не совпадают!');
                return false;
            }
            
            if (password.length < 6) {
                e.preventDefault();
                alert('❌ Пароль должен быть не менее 6 символов');
                return false;
            }
            
            btn.innerHTML = '⌛ Сохраняем...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
