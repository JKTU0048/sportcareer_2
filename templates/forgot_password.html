<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля - SportCareer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo-link">
                <div class="logo-text">🏆 SportCareer</div>
            </a>
            <ul>
                <li><a href="/">Главная</a></li>
                <li><a href="/about">О нас</a></li>
                <li><a href="/contact">Контакты</a></li>
                <li><a href="/login" style="color: #2ecc71;">Войти</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        <div class="content-block">
            <div class="login-container">
                <div class="login-form-container">
                    <h1 class="login-title">🔓 Восстановление пароля</h1>
                    
                    <form method="POST" action="/forgot_password">
                        <div class="form-group">
                            <label class="form-label">Ваш email *</label>
                            <input type="email" class="form-input" name="email" 
                                   placeholder="example@gmail.com" required>
                            <div class="password-hint">Введите email, указанный при регистрации</div>
                        </div>
                        
                        <button type="submit" class="submit-btn" style="width: 100%; margin-top: 1.5rem; padding: 15px;">
                            📨 Отправить инструкции
                        </button>
                        
                        <div class="login-links" style="text-align: center; margin-top: 2rem;">
                            <a href="/login" class="back-btn">← Назад ко входу</a>
                            <a href="/" class="back-btn" style="margin-left: 1rem; background-color: #95a5a6;">На главную</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        {% endblock %}
    </main>

    <footer>
        <p>🏆 SportCareer</p>
    </footer>
    
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const email = this.querySelector('input[name="email"]').value;
            const btn = this.querySelector('.submit-btn');
            
            if (!email.includes('@') || !email.includes('.')) {
                e.preventDefault();
                alert('❌ Пожалуйста, введите корректный email');
                return false;
            }
            
            btn.innerHTML = '⌛ Отправляем...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
